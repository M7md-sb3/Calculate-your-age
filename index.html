<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حاسبة العمر · هجري وميلادي</title>
  <!-- خط تجوال -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- مكتبة التحويل الهجري -->
  <script src="https://cdn.jsdelivr.net/npm/hijri-converter@2.0.0/dist/hijri-converter.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0a1f2a 0%, #0e2e3a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: 'Tajawal', sans-serif;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 48px;
      padding: 30px 28px;
      max-width: 850px;
      width: 100%;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(200, 230, 250, 0.05) inset;
    }
    h1 {
      color: #eef9ff;
      font-weight: 600;
      font-size: 2.2rem;
      margin-bottom: 6px;
      text-align: center;
      text-shadow: 0 4px 12px rgba(0, 20, 30, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 i { color: #7fcee8; font-size: 1.9rem; }
    .subhead {
      text-align: center;
      color: #b0d9e8;
      margin-bottom: 20px;
      font-size: 1rem;
      border-bottom: 1px dashed #3e6d7e;
      padding-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* أزرار التبديل */
    .calendar-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .toggle-btn {
      flex: 1;
      padding: 14px;
      background: rgba(10, 30, 38, 0.7);
      border: 1.5px solid #2f6b7c;
      border-radius: 40px;
      color: #b0d9e8;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Tajawal', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .toggle-btn.active {
      background: #c7e7f0;
      color: #0b2a35;
      border-color: #7fcee8;
      box-shadow: 0 0 15px rgba(127, 206, 232, 0.3);
    }
    .toggle-btn i { font-size: 1.1rem; }

    /* حقول الإدخال */
    .date-inputs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .input-field {
      flex: 1;
      min-width: 90px;
    }
    .input-field label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #cbe7f2;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .input-field label i { color: #6eb8cf; width: 18px; }
    .input-field input, .input-field select {
      width: 100%;
      padding: 14px 8px;
      background: rgba(10, 30, 38, 0.8);
      border: 1.5px solid #2f6b7c;
      border-radius: 16px;
      font-size: 1.1rem;
      color: #ffffff;
      outline: none;
      text-align: center;
      font-family: 'Tajawal', sans-serif;
    }
    .input-field input:hover, .input-field select:hover {
      border-color: #6bb8d4;
      background: rgba(15, 45, 55, 0.8);
    }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

    .btn {
      background: #c7e7f0;
      border: none;
      color: #0b2a35;
      font-weight: 700;
      font-size: 1.3rem;
      padding: 16px 24px;
      width: 100%;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 10px 18px -8px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.3);
      margin: 20px 0;
      font-family: 'Tajawal', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn:hover { background: #dcf3fc; transform: scale(0.98); }

    /* النتائج */
    .main-result {
      background: #0a262f;
      border-radius: 32px;
      padding: 24px 20px;
      border: 1px solid #2f6b7c;
      box-shadow: inset 0 6px 8px rgba(0,0,0,0.2), 0 10px 15px -5px #00000040;
      margin-bottom: 20px;
    }
    .birthdate-display {
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px dashed #2f6b7c;
    }
    .birthdate-label {
      color: #9ec6d4;
      font-size: 1rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .birthdate-value {
      color: #f2fcff;
      font-size: 2rem;
      font-weight: 700;
      text-shadow: 0 2px 8px #1e5f70;
    }
    .weekday-display {
      color: #b0d9e8;
      font-size: 1.1rem;
      margin-top: 8px;
    }
    .age-display {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 8px 18px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .age-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .age-number {
      font-size: 2.8rem;
      font-weight: 700;
      color: #f2fcff;
      line-height: 1.2;
      text-shadow: 0 2px 8px #1e5f70;
    }
    .age-label {
      font-size: 0.9rem;
      color: #9ec6d4;
      margin-top: 4px;
      font-weight: 500;
    }
    .separator {
      color: #6eb8cf;
      font-size: 2rem;
      font-weight: 300;
    }

    /* عرض التاريخ المحول */
    .converted-display {
      background: linear-gradient(135deg, #1a4a5a 0%, #0e3a47 100%);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid #3a8a9e;
      text-align: center;
    }
    .converted-title {
      color: #f5d371;
      font-size: 1.1rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .converted-value {
      color: #fff5e0;
      font-size: 1.5rem;
      font-weight: 600;
    }

    /* موعد الميلاد القادم */
    .next-birthday {
      background: linear-gradient(135deg, #134553 0%, #0b2f3a 100%);
      border-radius: 24px;
      padding: 18px 16px;
      margin-bottom: 20px;
      border: 1px solid #2f7a8c;
    }
    .next-title {
      color: #d9eef5;
      font-size: 1.1rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .next-countdown {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 25px;
    }
    .countdown-item { text-align: center; }
    .countdown-number {
      font-size: 2.2rem;
      font-weight: 700;
      color: #f5d371;
      text-shadow: 0 2px 8px #b8952a;
    }
    .countdown-label { color: #b0d9e8; font-size: 0.85rem; }

    /* الإحصائيات */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 20px;
    }
    .stat-card {
      background: #0e2e3a;
      border-radius: 18px;
      padding: 14px 10px;
      border: 1px solid #2f6b7c;
      text-align: center;
    }
    .stat-icon { color: #7fcee8; font-size: 1.3rem; margin-bottom: 6px; }
    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f2fcff;
      line-height: 1.3;
    }
    .stat-label { color: #9ec6d4; font-size: 0.8rem; margin-top: 4px; }

    /* صندوق الحكمة */
    .wisdom-box {
      background: linear-gradient(135deg, #134553 0%, #0b2f3a 100%);
      border-radius: 28px;
      padding: 20px 22px;
      border: 1px solid #2f7a8c;
      box-shadow: 0 8px 0 #08222b;
      margin-top: 20px;
    }
    .wisdom-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #d9eef5;
      margin-bottom: 12px;
      font-weight: 600;
      font-size: 1.2rem;
      border-bottom: 1px dashed #3e7e8e;
      padding-bottom: 10px;
    }
    .wisdom-header i { color: #f5d371; font-size: 1.3rem; }
    .wisdom-text {
      color: #e5f2f7;
      font-size: 1.15rem;
      line-height: 1.7;
      font-weight: 400;
      text-align: center;
      padding: 8px 0;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wisdom-text i { color: #f5d371; margin: 0 6px; font-size: 0.9rem; opacity: 0.7; }

    .error-message {
      color: #ffb0a7;
      background: #4a1e1e60;
      padding: 12px 16px;
      border-radius: 30px;
      margin: 16px 0;
      text-align: center;
    }
    .text-center { text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>
      <i class="fas fa-calculator"></i>
      حاسبة العمر الشاملة
      <i class="fas fa-calendar-alt"></i>
    </h1>
    <div class="subhead">
      <i class="fas fa-pen"></i> ميلادي · هجري (دقيق) · ساعة · دقيقة
      <i class="fas fa-lightbulb"></i> + حكمة لكل سنة
    </div>

    <!-- أزرار التبديل -->
    <div class="calendar-toggle">
      <button class="toggle-btn active" id="gregorianBtn">
        <i class="fas fa-calendar-alt"></i> ميلادي
      </button>
      <button class="toggle-btn" id="hijriBtn">
        <i class="fas fa-mosque"></i> هجري
      </button>
    </div>
    
    <!-- حقول التاريخ -->
    <div class="date-inputs">
      <div class="input-field">
        <label><i class="fas fa-sun"></i> <span id="dayLabel">اليوم</span></label>
        <input type="number" id="dayInput" placeholder="1-31" min="1" max="31" value="1">
      </div>
      <div class="input-field">
        <label><i class="fas fa-moon"></i> <span id="monthLabel">الشهر</span></label>
        <input type="number" id="monthInput" placeholder="1-12" min="1" max="12" value="1">
      </div>
      <div class="input-field">
        <label><i class="fas fa-star"></i> <span id="yearLabel">السنة</span></label>
        <input type="number" id="yearInput" placeholder="1999" min="1300" max="1550" value="1419">
      </div>
    </div>

    <!-- حقول الوقت -->
    <div class="date-inputs">
      <div class="input-field">
        <label><i class="fas fa-hourglass-start"></i> الساعة</label>
        <select id="hourSelect">
          <option value="0">00</option><option value="1">01</option><option value="2">02</option><option value="3">03</option>
          <option value="4">04</option><option value="5">05</option><option value="6">06</option><option value="7">07</option>
          <option value="8">08</option><option value="9">09</option><option value="10">10</option><option value="11">11</option>
          <option value="12" selected>12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option>
          <option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option>
          <option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option>
        </select>
      </div>
      <div class="input-field">
        <label><i class="fas fa-hourglass-end"></i> الدقيقة</label>
        <select id="minuteSelect">
          <option value="0">00</option><option value="5">05</option><option value="10">10</option><option value="15">15</option>
          <option value="20">20</option><option value="25">25</option><option value="30" selected>30</option><option value="35">35</option>
          <option value="40">40</option><option value="45">45</option><option value="50">50</option><option value="55">55</option>
        </select>
      </div>
    </div>

    <button class="btn" id="calculateBtn">
      <i class="fas fa-magic"></i> احسب العمر <i class="fas fa-arrow-left"></i>
    </button>

    <!-- منطقة النتائج -->
    <div id="resultArea"></div>

    <!-- قالب النتائج -->
    <template id="resultTemplate">
      <div class="main-result">
        <!-- تاريخ الميلاد -->
        <div class="birthdate-display">
          <div class="birthdate-label">
            <i class="fas fa-cake-candles"></i> تاريخ ميلادك <i class="fas fa-cake-candles"></i>
          </div>
          <div class="birthdate-value" id="displayBirthdate">—</div>
          <div class="weekday-display" id="displayWeekday">—</div>
        </div>

        <!-- التاريخ المحول (يظهر في كلا الوضعين) -->
        <div class="converted-display" id="convertedDisplay">
          <div class="converted-title" id="convertedTitle">
            <i class="fas fa-mosque"></i> التاريخ الهجري المقابل <i class="fas fa-calendar-alt"></i>
          </div>
          <div class="converted-value" id="convertedValue">—</div>
        </div>

        <!-- العمر الأساسي -->
        <div class="age-display">
          <div class="age-unit">
            <span class="age-number" id="displayYears">—</span>
            <span class="age-label"><i class="fas fa-star"></i> سنة</span>
          </div>
          <span class="separator">:</span>
          <div class="age-unit">
            <span class="age-number" id="displayMonths">—</span>
            <span class="age-label"><i class="fas fa-moon"></i> شهر</span>
          </div>
          <span class="separator">:</span>
          <div class="age-unit">
            <span class="age-number" id="displayDays">—</span>
            <span class="age-label"><i class="fas fa-sun"></i> يوم</span>
          </div>
        </div>

        <!-- لقد ولدت في يوم -->
        <div class="text-center" style="color: #b0d9e8; margin-bottom: 16px;">
          <i class="fas fa-baby"></i> لقد ولدت في يوم <span id="birthWeekday">—</span>
        </div>

        <!-- موعد الميلاد القادم -->
        <div class="next-birthday">
          <div class="next-title">
            <i class="fas fa-gift"></i> موعد ميلادك القادم <i class="fas fa-gift"></i>
          </div>
          <div class="next-countdown">
            <div class="countdown-item">
              <div class="countdown-number" id="nextMonths">—</div>
              <div class="countdown-label">شهر</div>
            </div>
            <div class="countdown-item">
              <div class="countdown-number" id="nextDays">—</div>
              <div class="countdown-label">يوم</div>
            </div>
          </div>
          <div class="text-center" style="color: #87b9c9; margin-top: 12px; font-size: 0.9rem;" id="nextDateDisplay">—</div>
        </div>

        <!-- الإحصائيات التفصيلية -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
            <div class="stat-value" id="totalMonths">—</div>
            <div class="stat-label">عمرك بالشهور</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-calendar-week"></i></div>
            <div class="stat-value" id="totalWeeks">—</div>
            <div class="stat-label">عمرك بالأسابيع</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-sun"></i></div>
            <div class="stat-value" id="totalDays">—</div>
            <div class="stat-label">عمرك بالأيام</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <div class="stat-value" id="totalHours">—</div>
            <div class="stat-label">عمرك بالساعات</div>
          </div>
          <div class="stat-card" style="grid-column: span 2; background: #1a4a5a;">
            <div class="stat-icon"><i class="fas fa-hourglass-half" style="color:#f5d371;"></i></div>
            <div class="stat-value" id="totalMinutes" style="color:#f5d371; font-size: 2rem;">—</div>
            <div class="stat-label">عمرك بالدقائق</div>
          </div>
        </div>
      </div>

      <!-- صندوق الحكمة -->
      <div class="wisdom-box">
        <div class="wisdom-header">
          <i class="fas fa-gem"></i>
          <span>حكمة السنة <span id="wisdomYear">—</span></span>
          <i class="fas fa-feather"></i>
        </div>
        <div class="wisdom-text">
          <i class="fas fa-quote-right"></i>
          <span id="wisdomContent">ستظهر هنا حكمة تناسب عمرك</span>
          <i class="fas fa-quote-left"></i>
        </div>
      </div>
    </template>
  </div>

  <script>
    (function() {
      'use strict';

        "المئة: قرن كامل من العمر المديد، في صحتك وعافيتك. يا له من إنجاز!"

      // العناصر
      const gregorianBtn = document.getElementById('gregorianBtn');
      const hijriBtn = document.getElementById('hijriBtn');
      const dayLabel = document.getElementById('dayLabel');
      const monthLabel = document.getElementById('monthLabel');
      const yearLabel = document.getElementById('yearLabel');
      const dayInput = document.getElementById('dayInput');
      const monthInput = document.getElementById('monthInput');
      const yearInput = document.getElementById('yearInput');
      const hourSelect = document.getElementById('hourSelect');
      const minuteSelect = document.getElementById('minuteSelect');
      const calculateBtn = document.getElementById('calculateBtn');
      const resultArea = document.getElementById('resultArea');
      const template = document.getElementById('resultTemplate');

      let currentCalendar = 'gregorian';

      const weekdaysArabic = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
      const monthsArabic = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
      const hijriMonths = ['محرم', 'صفر', 'ربيع الأول', 'ربيع الثاني', 'جمادى الأولى', 'جمادى الآخرة', 'رجب', 'شعبان', 'رمضان', 'شوال', 'ذو القعدة', 'ذو الحجة'];

      // دالة تحويل هجري إلى ميلادي باستخدام hijri-converter
      function hijriToGregorian(year, month, day) {
        try {
          const result = HijriConverter.toGregorian(year, month, day);
          return new Date(result.year, result.month - 1, result.day);
        } catch (e) {
          // إذا فشل التحويل (خارج النطاق)، نستخدم التقريب
          const gYear = Math.floor((year * 0.970225) + 621.577);
          return new Date(gYear, month - 1, Math.min(day, 28));
        }
      }

      // دالة تحويل ميلادي إلى هجري
      function gregorianToHijri(year, month, day) {
        try {
          return HijriConverter.toHijri(year, month, day);
        } catch (e) {
          return null;
        }
      }

      function formatHijriDisplay(year, month, day) {
        return `${day} ${hijriMonths[month - 1]} ${year} هـ`;
      }

      function isValidDate(day, month, year, isHijri = false) {
        if (!day || !month || !year || isNaN(day) || isNaN(month) || isNaN(year)) return false;
        if (month < 1 || month > 12) return false;
        
        if (isHijri) {
          if (year < 1300 || year > 1550) return false;
        } else {
          if (year < 1900 || year > new Date().getFullYear()) return false;
        }
        
        let daysInMonth = 30;
        if (isHijri) {
          daysInMonth = 30; // تقريباً كل الشهور الهجرية 29 أو 30
        } else {
          if (month === 2) daysInMonth = 28;
          else if ([4, 6, 9, 11].includes(month)) daysInMonth = 30;
          else daysInMonth = 31;
        }
        
        return day >= 1 && day <= daysInMonth;
      }

      function calculateAgeDetails(birthDate) {
        const now = new Date();
        const diffMs = now - birthDate;
        
        const totalMinutes = Math.floor(diffMs / (1000 * 60));
        const totalHours = Math.floor(diffMs / (1000 * 60 * 60));
        const totalDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        const totalWeeks = Math.floor(totalDays / 7);
        const totalMonths = Math.floor(totalDays / 30.44);

        let years = now.getFullYear() - birthDate.getFullYear();
        let months = now.getMonth() - birthDate.getMonth();
        let days = now.getDate() - birthDate.getDate();

        if (days < 0) {
          months--;
          const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
          days += prevMonth.getDate();
        }
        if (months < 0) { years--; months += 12; }

        return { years, months, days, totalMonths: Math.round(totalMonths), totalWeeks, totalDays, totalHours, totalMinutes };
      }

      function getNextBirthday(birthDate) {
        const now = new Date();
        const birth = new Date(birthDate);
        
        let nextBirthday = new Date(now.getFullYear(), birth.getMonth(), birth.getDate());
        nextBirthday.setHours(birth.getHours(), birth.getMinutes(), 0, 0);
        
        if (nextBirthday < now) {
          nextBirthday = new Date(now.getFullYear() + 1, birth.getMonth(), birth.getDate());
          nextBirthday.setHours(birth.getHours(), birth.getMinutes(), 0, 0);
        }

        const diffMs = nextBirthday - now;
        const totalDaysRemaining = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
        const monthsRemaining = Math.floor(totalDaysRemaining / 30.44);
        const daysRemaining = Math.round(totalDaysRemaining - (monthsRemaining * 30.44));

        return {
          months: monthsRemaining,
          days: daysRemaining,
          displayDate: `${nextBirthday.getDate()} ${monthsArabic[nextBirthday.getMonth()]} ${nextBirthday.getFullYear()}`
        };
      }

      function displayResults(day, month, year, hour, minute, isHijri = false) {
        let birthDate;
        let displayDate;
        let convertedTitle = '';
        let convertedValue = '';
        
        if (isHijri) {
          birthDate = hijriToGregorian(year, month, day);
          birthDate.setHours(hour, minute, 0, 0);
          displayDate = formatHijriDisplay(year, month, day);
          
          const gYear = birthDate.getFullYear();
          const gMonth = birthDate.getMonth() + 1;
          const gDay = birthDate.getDate();
          convertedTitle = '<i class="fas fa-calendar-alt"></i> التاريخ الميلادي المقابل <i class="fas fa-mosque"></i>';
          convertedValue = `${gDay} ${monthsArabic[gMonth-1]} ${gYear} م`;
        } else {
          birthDate = new Date(year, month - 1, day, hour, minute, 0);
          displayDate = `${day} ${monthsArabic[month-1]} ${year}`;
          
          const hijri = gregorianToHijri(year, month, day);
          if (hijri) {
            convertedTitle = '<i class="fas fa-mosque"></i> التاريخ الهجري المقابل <i class="fas fa-calendar-alt"></i>';
            convertedValue = formatHijriDisplay(hijri.year, hijri.month, hijri.day);
          } else {
            convertedTitle = '<i class="fas fa-mosque"></i> التاريخ الهجري المقابل <i class="fas fa-calendar-alt"></i>';
            convertedValue = 'غير متاح (خارج النطاق المدعوم)';
          }
        }

        const now = new Date();

        if (birthDate > now) {
          resultArea.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> تاريخ الميلاد لا يمكن أن يكون في المستقبل!</div>`;
          return;
        }

        const clone = template.content.cloneNode(true);
        const age = calculateAgeDetails(birthDate);
        const nextBirthday = getNextBirthday(birthDate);
        const weekdayIndex = birthDate.getDay();
        const weekdayName = weekdaysArabic[weekdayIndex];

        clone.getElementById('displayBirthdate').textContent = displayDate;
        clone.getElementById('displayWeekday').innerHTML = `<i class="fas fa-calendar"></i> ${weekdayName} - ${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}`;
        
        clone.getElementById('convertedTitle').innerHTML = convertedTitle;
        clone.getElementById('convertedValue').textContent = convertedValue;
        
        clone.getElementById('displayYears').textContent = age.years;
        clone.getElementById('displayMonths').textContent = age.months;
        clone.getElementById('displayDays').textContent = age.days;
        clone.getElementById('birthWeekday').textContent = weekdayName;
        clone.getElementById('nextMonths').textContent = nextBirthday.months;
        clone.getElementById('nextDays').textContent = nextBirthday.days;
        clone.getElementById('nextDateDisplay').innerHTML = `<i class="far fa-calendar-check"></i> ${nextBirthday.displayDate}`;
        
        clone.getElementById('totalMonths').textContent = age.totalMonths.toLocaleString('ar-EG');
        clone.getElementById('totalWeeks').textContent = age.totalWeeks.toLocaleString('ar-EG');
        clone.getElementById('totalDays').textContent = age.totalDays.toLocaleString('ar-EG');
        clone.getElementById('totalHours').textContent = age.totalHours.toLocaleString('ar-EG');
        clone.getElementById('totalMinutes').textContent = age.totalMinutes.toLocaleString('ar-EG');

        const yearIndex = Math.min(age.years, 100);
        clone.getElementById('wisdomYear').textContent = yearIndex || 1;
        clone.getElementById('wisdomContent').textContent = wisdoms[yearIndex] || wisdoms[1];

        resultArea.innerHTML = '';
        resultArea.appendChild(clone);
      }

      function showError(msg) {
        resultArea.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${msg}</div>`;
      }

      function updateUIForCalendar() {
        if (currentCalendar === 'gregorian') {
          dayLabel.textContent = 'اليوم';
          monthLabel.textContent = 'الشهر';
          yearLabel.textContent = 'السنة';
          dayInput.placeholder = '1-31';
          monthInput.placeholder = '1-12';
          yearInput.placeholder = '1999';
          dayInput.min = 1; dayInput.max = 31;
          monthInput.min = 1; monthInput.max = 12;
          yearInput.min = 1900; yearInput.max = 2100;
          yearInput.value = 1999;
          monthInput.value = 1;
          dayInput.value = 1;
        } else {
          dayLabel.textContent = 'اليوم';
          monthLabel.textContent = 'الشهر';
          yearLabel.textContent = 'السنة هـ';
          dayInput.placeholder = '1-30';
          monthInput.placeholder = '1-12';
          yearInput.placeholder = '1446';
          dayInput.min = 1; dayInput.max = 30;
          monthInput.min = 1; monthInput.max = 12;
          yearInput.min = 1343; yearInput.max = 1500;
          yearInput.value = 1419;
          monthInput.value = 9;
          dayInput.value = 14;
        }
      }

      function handleCalculate() {
        const day = parseInt(dayInput.value);
        const month = parseInt(monthInput.value);
        const year = parseInt(yearInput.value);
        const hour = parseInt(hourSelect.value);
        const minute = parseInt(minuteSelect.value);

        if (!dayInput.value || !monthInput.value || !yearInput.value) {
          showError('الرجاء إدخال اليوم والشهر والسنة كاملة');
          return;
        }
        if (!isValidDate(day, month, year, currentCalendar === 'hijri')) {
          showError('تاريخ غير صالح. تأكد من اليوم والشهر والسنة');
          return;
        }

        displayResults(day, month, year, hour, minute, currentCalendar === 'hijri');
      }

      gregorianBtn.addEventListener('click', () => {
        currentCalendar = 'gregorian';
        gregorianBtn.classList.add('active');
        hijriBtn.classList.remove('active');
        updateUIForCalendar();
        handleCalculate();
      });

      hijriBtn.addEventListener('click', () => {
        currentCalendar = 'hijri';
        hijriBtn.classList.add('active');
        gregorianBtn.classList.remove('active');
        updateUIForCalendar();
        handleCalculate();
      });

      calculateBtn.addEventListener('click', handleCalculate);
      [dayInput, monthInput, yearInput].forEach(i => i.addEventListener('keypress', e => { if(e.key==='Enter') handleCalculate(); }));
      
      window.addEventListener('DOMContentLoaded', () => {
        updateUIForCalendar();
        handleCalculate();
      });
    })();
  </script>
